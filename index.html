<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Wine Explorer</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="header">
    <h1>🍷 Voice Wine Explorer</h1>
    <p>Ask anything about our wine collection — by voice or text</p>
  </header>

  <main class="main-card">



    <div class="question-display" id="questionDisplay">
      <span class="placeholder">Your question will appear here...</span>
    </div>

    <div class="text-input-row">
      <input type="text" id="textInput" placeholder="Or type your question here..." />
    </div>

    <div class="controls">
      <button class="btn-mic" id="micBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
        Speak
      </button>
      <button class="btn-ask" id="askBtn">Ask question</button>
    </div>

    <div class="answer-section" id="answerSection">
      <div class="answer-label">
        <span>Answer</span>
        <button class="btn-speak" id="speakBtn">▶ Read aloud</button>
      </div>
      <div class="answer-text" id="answerText"></div>
    </div>

    <div class="status-bar" id="statusBar"></div>

    <div class="examples">
      <p class="examples-label">Try asking</p>
      <div class="example-chips" id="exampleChips">
        <span class="chip">Best-rated wines under $50?</span>
        <span class="chip">What do you have from Burgundy?</span>
        <span class="chip">Most expensive bottle?</span>
        <span class="chip">Good housewarming gift wine?</span>
        <span class="chip">Best Champagne options?</span>
        <span class="chip">Affordable Italian reds?</span>
      </div>
    </div>

  </main>

  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/api.js"></script>
  <script src="js/voice.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
